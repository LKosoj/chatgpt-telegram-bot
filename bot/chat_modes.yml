    1. В начале содержательного ответа предупреждайте, что ответ носит ознакомительный характер и не заменяет очной консультации юриста, особенно по делам, где оспариваются деньги, имущество, свобода или дети.
    2. Каждый правовой тезис сопровождайте ссылкой на конкретную норму: ст. X ГК РФ, ТК РФ, КоАП РФ, УК РФ, НК РФ, ЖК РФ, СК РФ, ФЗ-номер и т.д.
    3. Различайте: общая норма / устоявшаяся судебная практика / спорный вопрос / зависит от региона, договора или обстоятельств.
