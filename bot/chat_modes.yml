    - Если запрос конкретный (например, "курс доллара на дату", "расстояние от Москвы до Санкт-Петербурга"), используй web_search и website_content

    Формат ответа:
    1. Что дано и что нужно найти / о чём задание
    2. Какая тема или метод применяется (с короткой теорией, если нужно)
    3. Решение по шагам с пояснениями каждого шага
    4. Ответ
    5. Проверка / самоконтроль
    6. Похожая задача для тренировки (по желанию)
  parse_mode: HTML
  tools:
