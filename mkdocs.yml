site_name: chatgpt-telegram-bot
docs_dir: .ai-docs
site_dir: ai_docs_site
plugins:
- search
- mermaid2:
    javascript: js/mermaid.min.js
markdown_extensions:
- tables
- sane_lists
- attr_list
- def_list
- footnotes
- admonition
- fenced_code
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:mermaid2.fence_mermaid ''
nav:
- Главная: index.md
- Обзор:
  - Обзор проекта: overview.md
- Архитектура: architecture.md
- Запуск: runtime.md
- Зависимости: dependencies.md
- Тестирование: testing.md
- Соглашения: conventions.md
- Глоссарий: glossary.md
- Конфиги:
  - Docker: configs/docker.md
  - service_mesh: configs/service_mesh.md
- Конфигурация проекта:
  - Обзор: configs/index.md
  - /bot:
    - /plugins:
      - /pdf_cache:
        - cache_metadata.json: configs/files/bot/plugins/pdf_cache/cache_metadata__json.md
      - agent_config.yml: configs/files/bot/plugins/agent_config__yml.md
    - chat_modes.yml: configs/files/bot/chat_modes__yml.md
  - environment.yml: configs/files/environment__yml.md
  - pytest.ini: configs/files/pytest__ini.md
- Модули:
  - Обзор: modules/index.md
  - /bot:
    - /plugins:
      - agent_tools.py: modules/bot/plugins/agent_tools__py.md
      - ask_your_pdf.py: modules/bot/plugins/ask_your_pdf__py.md
      - auto_tts.py: modules/bot/plugins/auto_tts__py.md
