      - ddg_web_search.py: modules/bot/plugins/ddg_web_search__py.md
      - deepl.py: modules/bot/plugins/deepl__py.md
      - dice.py: modules/bot/plugins/dice__py.md
      - github_analysis.py: modules/bot/plugins/github_analysis__py.md
